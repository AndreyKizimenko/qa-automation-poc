agent_options:
  path: ../lib/agent-options.yml

org_settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
  fleet_desktop:
    transparency_url: https://fleetdm.com/transparency
  host_expiry_settings:
    host_expiry_enabled: false
    host_expiry_window: 0
  mdm:
    end_user_authentication:
      entity_id: fleet-eua
      idp_name: Okta
      metadata_url: $FLEET_EUA_METADATA_URL
    apple_business_manager:
      - organization_name: $FLEET_ABM_ORG_NAME
        macos_fleet: Workstations
        ios_fleet: Workstations
        ipados_fleet: Workstations
    volume_purchasing_program:
      - location: $FLEET_VPP_LOCATION
        fleets:
          - "All teams"
  org_info:
    contact_url: https://fleetdm.com/company/contact
    org_logo_url: ""
    org_logo_url_light_background: ""
    org_name: Premium QA Automation (min)
  # secrets: omitted — enroll secrets are managed via UI on the premium instance
  server_settings:
    ai_features_disabled: false
    deferred_save_host: false
    discard_reports_data: false
    enable_analytics: false
    live_reporting_disabled: false
    report_cap: 0
    scripts_disabled: false
    server_url: $FLEET_URL
  sso_settings:
    enable_sso: true
    enable_sso_idp_login: false
    entity_id: fleet
    idp_image_url: ""
    idp_name: Okta
    metadata_url: $FLEET_SSO_METADATA_URL

