# Empty Workstations team. The team itself is preserved because the
# top-level ABM/VPP config binds device assignment to its name; only the
# content is wiped so Playwright sees a clean slate.
name: Workstations

agent_options:
  path: ../../lib/agent-options.yml

settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
  host_expiry_settings:
    host_expiry_enabled: false
    host_expiry_window: 0

controls:
  scripts: []
  apple_settings:
    configuration_profiles: []
  windows_settings:
    configuration_profiles: []
  android_settings:
    configuration_profiles: []
  setup_experience:
    enable_end_user_authentication: false

policies: []
queries: []
