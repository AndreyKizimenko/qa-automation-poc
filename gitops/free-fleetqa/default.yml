agent_options:
  path: ./agent-options.yml

org_settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
  fleet_desktop:
    transparency_url: https://fleetdm.com/transparency
  host_expiry_settings:
    host_expiry_enabled: false
    host_expiry_window: 0
  org_info:
    contact_url: https://fleetdm.com/company/contact
    org_logo_url: ""
    org_logo_url_light_background: ""
    org_name: Free QA Automation
  secrets:
    - secret: $FLEET_ENROLL_SECRET
  server_settings:
    ai_features_disabled: false
    deferred_save_host: false
    discard_reports_data: false
    enable_analytics: false
    live_reporting_disabled: false
    report_cap: 0
    scripts_disabled: false
    server_url: $FLEET_URL
  sso_settings:
    enable_sso: true
    enable_sso_idp_login: false
    entity_id: fleet
    idp_image_url: ""
    idp_name: Okta
    metadata_url: $FLEET_SSO_METADATA_URL

controls:
  windows_enabled_and_configured: true
  scripts:
    - path: ./platforms/macos/scripts/toggle-fleetd-debug.sh
    - path: ./platforms/macos/scripts/uninstall-fleetd-macos.sh
    - path: ./platforms/macos/scripts/update-safari.sh
    - path: ./platforms/windows/scripts/create-admin-user.ps1
    - path: ./platforms/windows/scripts/enable-ms-defender.ps1
    - path: ./platforms/windows/scripts/hide-windows-insider-settings-page.ps1
    - path: ./platforms/windows/scripts/toggle-fleetd-debug.ps1
    - path: ./platforms/windows/scripts/uninstall-fleetd-windows.ps1
    - path: ./platforms/windows/scripts/uninstall-zoom.ps1
    - path: ./platforms/linux/scripts/change-password-linux.sh
    - path: ./platforms/linux/scripts/uninstall-fleetd-linux.sh
  apple_settings:
    configuration_profiles:
      - path: ./platforms/macos/configuration-profiles/date-time.mobileconfig
      - path: ./platforms/macos/configuration-profiles/disable-bluetooth-file-sharing.mobileconfig
      - path: ./platforms/macos/configuration-profiles/disable-content-caching.mobileconfig
      - path: ./platforms/macos/configuration-profiles/disable-guest-account.mobileconfig
      - path: ./platforms/macos/configuration-profiles/disable-internet-sharing.mobileconfig
      - path: ./platforms/macos/configuration-profiles/disable-media-sharing.mobileconfig
      - path: ./platforms/macos/configuration-profiles/enable-firewall-logging.mobileconfig
      - path: ./platforms/macos/configuration-profiles/enable-gatekeeper.mobileconfig
      - path: ./platforms/macos/configuration-profiles/firewall.mobileconfig
      - path: ./platforms/macos/configuration-profiles/limit-ad-tracking.mobileconfig
      - path: ./platforms/macos/configuration-profiles/prevent-autologon.mobileconfig
  windows_settings:
    configuration_profiles:
      - path: ./platforms/windows/configuration-profiles/advanced-powershell-logging.xml
      - path: ./platforms/windows/configuration-profiles/bluetooth-settings.xml
      - path: ./platforms/windows/configuration-profiles/disable-game-dvr.xml
      - path: ./platforms/windows/configuration-profiles/disable-guest-account.xml
      - path: ./platforms/windows/configuration-profiles/disable-onedrive.xml
      - path: ./platforms/windows/configuration-profiles/disable-remote-assistance.xml
      - path: ./platforms/windows/configuration-profiles/disable-spotlight.xml
      - path: ./platforms/windows/configuration-profiles/enable-firewall.xml
      - path: ./platforms/windows/configuration-profiles/enable-smartscreen.xml
      - path: ./platforms/windows/configuration-profiles/windows-defender-compliance.xml
  android_settings:
    configuration_profiles:
      - path: ./platforms/android/configuration-profiles/disable-camera.json
      - path: ./platforms/android/configuration-profiles/disable-screen-capture.json

