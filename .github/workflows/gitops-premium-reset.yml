name: GitOps — Premium reset

# Applies the empty (test-state-wiped) variant of the premium gitops
# config across no-team and Workstations team. Leaves both scopes with
# no policies, reports, scripts, or profiles so Playwright runs against
# a known-blank baseline. Labels, ABM/VPP/EUA, and other env settings
# are preserved. The Workstations team itself stays because ABM binds
# device assignment to its name.

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: gitops-premium # shared with gitops-premium / gitops-premium-min — same target instance
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  apply:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Apply reset configuration to Fleet
        uses: ./.github/gitops-action
        with:
          config-files: |
            gitops/premium-fleetqa-reset/default.yml
            gitops/premium-fleetqa-reset/fleets/workstations.yml
          delete-other-fleets: 'true'
          dry-run-only: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        env:
          FLEET_URL:              ${{ secrets.FLEET_PREMIUM_URL }}
          FLEET_API_TOKEN:        ${{ secrets.FLEET_PREMIUM_API_TOKEN }}
          FLEET_SSO_METADATA_URL: ${{ secrets.FLEET_PREMIUM_SSO_METADATA_URL }}
          FLEET_EUA_METADATA_URL: ${{ secrets.FLEET_EUA_METADATA_URL }}
          FLEET_ABM_ORG_NAME:     ${{ secrets.FLEET_ABM_ORG_NAME }}
          FLEET_VPP_LOCATION:     ${{ secrets.FLEET_VPP_LOCATION }}
