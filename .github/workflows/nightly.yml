name: Nightly QA

# Nightly orchestrator: ties Render deploy, GitOps apply, and API verification
# into a single run with clear pass/fail per stage.
#
# Render redeploy runs separately at 23:00 UTC (own schedule on render-deploy.yml)
# so the instances are warm by the time this orchestrator starts.
#
# Sequence:
#   1. gitops-free               apply baseline config (free-fleetqa)
#   2. api-verify-baseline       confirm live state matches baseline
#   3. gitops-free-min           apply trimmed variant (free-fleetqa-min)
#   4. api-verify-min            confirm live state matches the variant
#                                (proves gitops mutations actually land)
#   5. gitops-free-restore       re-apply baseline so the instance is in a
#                                known good state for any later smoke runs

on:
  schedule:
    - cron: '0 0 * * *' # 00:00 UTC — 60 min after render-deploy at 23:00 UTC
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  gitops-free:
    uses: ./.github/workflows/gitops-free.yml
    secrets: inherit

  api-verify-baseline:
    needs: gitops-free
    uses: ./.github/workflows/api-verify.yml
    with:
      variant: baseline
    secrets: inherit

  gitops-free-min:
    needs: api-verify-baseline
    uses: ./.github/workflows/gitops-free-min.yml
    secrets: inherit

  api-verify-min:
    needs: gitops-free-min
    uses: ./.github/workflows/api-verify.yml
    with:
      variant: min
    secrets: inherit

  gitops-free-restore:
    # Always run (even if a verify step failed) so the instance is left in
    # baseline state. `if: always()` lets this run regardless of upstream
    # success, but only after the variant attempt has completed/skipped.
    if: ${{ always() }}
    needs: api-verify-min
    uses: ./.github/workflows/gitops-free.yml
    secrets: inherit
