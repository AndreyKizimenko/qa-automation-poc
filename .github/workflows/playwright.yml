name: Playwright Smoke

# Manual-only for now. Runs the smoke suite against free, premium, or both.
# Uses storage state (.auth/) re-created by the per-tier setup project.

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which Fleet instance to test'
        required: true
        default: free
        type: choice
        options:
          - free
          - premium
          - all

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  free:
    if: ${{ inputs.suite == 'free' || inputs.suite == 'all' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Write .env.free from secrets
        run: |
          cat > .env.free <<EOF
          FLEET_URL=${{ secrets.FLEET_FREE_URL }}
          FLEET_API_TOKEN=${{ secrets.FLEET_FREE_API_TOKEN }}
          FLEET_ADMIN_EMAIL=${{ secrets.FLEET_FREE_ADMIN_EMAIL }}
          FLEET_ADMIN_PASSWORD=${{ secrets.FLEET_FREE_ADMIN_PASSWORD }}
          FLEET_SSO_LOGIN_USERNAME=${{ secrets.FLEET_SSO_LOGIN_USERNAME }}
          FLEET_SSO_LOGIN_PASSWORD=${{ secrets.FLEET_SSO_LOGIN_PASSWORD }}
          EOF

      - run: npm run test:free:smoke

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-free
          path: playwright/playwright-report/
          retention-days: 14

  premium:
    if: ${{ inputs.suite == 'premium' || inputs.suite == 'all' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Write .env.premium from secrets
        run: |
          cat > .env.premium <<EOF
          FLEET_URL=${{ secrets.FLEET_PREMIUM_URL }}
          FLEET_API_TOKEN=${{ secrets.FLEET_PREMIUM_API_TOKEN }}
          FLEET_ADMIN_EMAIL=${{ secrets.FLEET_PREMIUM_ADMIN_EMAIL }}
          FLEET_ADMIN_PASSWORD=${{ secrets.FLEET_PREMIUM_ADMIN_PASSWORD }}
          FLEET_SSO_LOGIN_USERNAME=${{ secrets.FLEET_SSO_LOGIN_USERNAME }}
          FLEET_SSO_LOGIN_PASSWORD=${{ secrets.FLEET_SSO_LOGIN_PASSWORD }}
          EOF

      - run: npm run test:premium:smoke

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-premium
          path: playwright/playwright-report/
          retention-days: 14
