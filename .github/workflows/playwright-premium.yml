name: Playwright — Premium

# Runs the full Playwright suite against the premium Fleet instance.

on:
  schedule:
    - cron: '30 5 * * *' # 05:30 UTC — 30 min after nightly gitops kicks off at 05:00
  workflow_dispatch:

# Opt the bundled JS actions into Node 24 ahead of GitHub's June 2026 force-flip
# (actions/upload-artifact@v5 still ships on Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Write .env.premium from secrets
        run: |
          cat > .env.premium <<EOF
          FLEET_URL=${{ secrets.FLEET_PREMIUM_URL }}
          FLEET_API_TOKEN=${{ secrets.FLEET_PREMIUM_API_TOKEN }}
          FLEET_ADMIN_EMAIL=${{ secrets.FLEET_PREMIUM_ADMIN_EMAIL }}
          FLEET_ADMIN_PASSWORD=${{ secrets.FLEET_PREMIUM_ADMIN_PASSWORD }}
          FLEET_SSO_LOGIN_USERNAME=${{ secrets.FLEET_SSO_LOGIN_USERNAME }}
          FLEET_SSO_LOGIN_PASSWORD=${{ secrets.FLEET_SSO_LOGIN_PASSWORD }}
          FLEET_TEST_USER_PASSWORD=${{ secrets.FLEET_PREMIUM_TEST_USER_PASSWORD }}
          FLEET_STATIC_USER_PASSWORD=${{ secrets.FLEET_PREMIUM_STATIC_USER_PASSWORD }}
          FLEET_STATIC_TOKEN_API_GLOBAL_ADMIN=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_GLOBAL_ADMIN }}
          FLEET_STATIC_TOKEN_API_GLOBAL_MAINTAINER=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_GLOBAL_MAINTAINER }}
          FLEET_STATIC_TOKEN_API_GLOBAL_OBSERVER=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_GLOBAL_OBSERVER }}
          FLEET_STATIC_TOKEN_API_GLOBAL_OBSERVER_PLUS=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_GLOBAL_OBSERVER_PLUS }}
          FLEET_STATIC_TOKEN_API_GLOBAL_TECHNICIAN=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_GLOBAL_TECHNICIAN }}
          FLEET_STATIC_TOKEN_API_GLOBAL_GITOPS=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_GLOBAL_GITOPS }}
          FLEET_STATIC_TOKEN_API_WS_MAINTAINER=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_WS_MAINTAINER }}
          FLEET_STATIC_TOKEN_API_WS_OBSERVER=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_WS_OBSERVER }}
          FLEET_STATIC_TOKEN_API_WS_MAINT_QA_OBS=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_WS_MAINT_QA_OBS }}
          FLEET_STATIC_TOKEN_API_SPECIFIC_ENDPOINTS_GLOBAL=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_SPECIFIC_ENDPOINTS_GLOBAL }}
          FLEET_STATIC_TOKEN_API_SPECIFIC_ENDPOINTS_WS=${{ secrets.FLEET_PREMIUM_STATIC_TOKEN_API_SPECIFIC_ENDPOINTS_WS }}
          EOF

      - run: npm run test:premium

      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-premium
          path: playwright/playwright-report/
          retention-days: 14
