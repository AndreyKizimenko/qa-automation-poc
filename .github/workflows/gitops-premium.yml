name: GitOps — Premium

on:
  push:
    branches: [main]
    paths:
      - 'gitops/premium-fleetqa/**'
      - '.github/workflows/gitops-premium.yml'
      - '.github/gitops-action/**'
  pull_request:
    paths:
      - 'gitops/premium-fleetqa/**'
      - '.github/workflows/gitops-premium.yml'
      - '.github/gitops-action/**'
  workflow_dispatch:
  schedule:
    - cron: '15 0 * * *' # 00:15 UTC — 75 min after Render redeploy, offset from free

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  apply:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply latest configuration to Fleet
        uses: ./.github/gitops-action
        with:
          config-file: gitops/premium-fleetqa/default.yml
          dry-run-only: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        env:
          FLEET_URL:              ${{ secrets.FLEET_PREMIUM_URL }}
          FLEET_API_TOKEN:        ${{ secrets.FLEET_PREMIUM_API_TOKEN }}
          FLEET_ENROLL_SECRET:    ${{ secrets.FLEET_PREMIUM_ENROLL_SECRET }}
          FLEET_SSO_METADATA_URL: ${{ secrets.FLEET_SSO_METADATA_URL }}
