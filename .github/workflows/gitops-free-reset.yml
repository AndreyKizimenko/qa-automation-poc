name: GitOps — Free reset

# Applies the empty (test-state-wiped) variant of the free gitops config.
# Leaves no-team scope with no policies, reports, scripts, or profiles
# so Playwright runs against a known-blank baseline. Labels and env
# settings (SSO, SMTP, org info) are preserved.

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: gitops-free # shared with gitops-free / gitops-free-min — same target instance
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  apply:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Apply reset configuration to Fleet
        uses: ./.github/gitops-action
        with:
          config-files: gitops/free-fleetqa-reset/default.yml
          dry-run-only: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        env:
          FLEET_URL:              ${{ secrets.FLEET_FREE_URL }}
          FLEET_API_TOKEN:        ${{ secrets.FLEET_FREE_API_TOKEN }}
          FLEET_ENROLL_SECRET:    ${{ secrets.FLEET_FREE_ENROLL_SECRET }}
          FLEET_SSO_METADATA_URL: ${{ secrets.FLEET_FREE_SSO_METADATA_URL }}
