name: GitOps — Premium (min variant)

# Applies the trimmed `premium-fleetqa-min` config — used by the API-verify
# tests to confirm `fleetctl gitops` actually mutates a Premium instance,
# including team-scoped resources.
#
# Manual / on-demand only. The orchestrator (nightly.yml) runs this in sequence.

on:
  workflow_dispatch:
  workflow_call:
  # No push/pull_request triggers — gitops only runs from the nightly
  # orchestrator (workflow_call) or manual dispatch.

concurrency:
  group: gitops-premium # share the lock with gitops-premium.yml — same target instance
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  apply:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply latest configuration to Fleet
        uses: ./.github/gitops-action
        with:
          config-files: |
            gitops/premium-fleetqa-min/default.yml
            gitops/premium-fleetqa-min/fleets/workstations.yml
          delete-other-fleets: 'true'
          dry-run-only: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        env:
          FLEET_URL:              ${{ secrets.FLEET_PREMIUM_URL }}
          FLEET_API_TOKEN:        ${{ secrets.FLEET_PREMIUM_API_TOKEN }}
          FLEET_SSO_METADATA_URL: ${{ secrets.FLEET_PREMIUM_SSO_METADATA_URL }}
          FLEET_EUA_METADATA_URL: ${{ secrets.FLEET_EUA_METADATA_URL }}
          FLEET_ABM_ORG_NAME:     ${{ secrets.FLEET_ABM_ORG_NAME }}
          FLEET_VPP_LOCATION:     ${{ secrets.FLEET_VPP_LOCATION }}
