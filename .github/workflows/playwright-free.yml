name: Playwright — Free

# Runs the @free-tagged Playwright suite against the free Fleet instance.

on:
  schedule:
    - cron: '30 5 * * *' # 05:30 UTC — 30 min after nightly gitops kicks off at 05:00
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Write .env.free from secrets
        run: |
          cat > .env.free <<EOF
          FLEET_URL=${{ secrets.FLEET_FREE_URL }}
          FLEET_API_TOKEN=${{ secrets.FLEET_FREE_API_TOKEN }}
          FLEET_ADMIN_EMAIL=${{ secrets.FLEET_FREE_ADMIN_EMAIL }}
          FLEET_ADMIN_PASSWORD=${{ secrets.FLEET_FREE_ADMIN_PASSWORD }}
          FLEET_SSO_LOGIN_USERNAME=${{ secrets.FLEET_SSO_LOGIN_USERNAME }}
          FLEET_SSO_LOGIN_PASSWORD=${{ secrets.FLEET_SSO_LOGIN_PASSWORD }}
          FLEET_TEST_USER_PASSWORD=${{ secrets.FLEET_FREE_TEST_USER_PASSWORD }}
          FLEET_STATIC_USER_PASSWORD=${{ secrets.FLEET_FREE_STATIC_USER_PASSWORD }}
          FLEET_STATIC_TOKEN_API_GLOBAL_ADMIN=${{ secrets.FLEET_FREE_STATIC_TOKEN_API_GLOBAL_ADMIN }}
          FLEET_STATIC_TOKEN_API_GLOBAL_MAINTAINER=${{ secrets.FLEET_FREE_STATIC_TOKEN_API_GLOBAL_MAINTAINER }}
          FLEET_STATIC_TOKEN_API_GLOBAL_OBSERVER=${{ secrets.FLEET_FREE_STATIC_TOKEN_API_GLOBAL_OBSERVER }}
          EOF

      - run: npm run test:free

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-free
          path: playwright/playwright-report/
          retention-days: 14
